<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Új jelszó beállítása</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="bejelentkezo.css">
</head>
<body onload="fillResetTokenFromUrl()">
<div class="container">
    <div class="row justify-content-center w-100">
        <div class="col-md-4 col-sm-8">
            <div class="card">
                <div class="card-header text-white">
                    <h4 class="mb-0 h3">Új jelszó beállítása</h4>
                </div>
                <div class="card-body">
                    <input type="hidden" id="resetToken">

                    <div class="mb-3">
                        <label class="form-label">Új jelszó</label>
                        <input type="password" id="pass" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Új jelszó újra</label>
                        <input type="password" id="passconf" class="form-control">
                    </div>

                    <div class="d-grid gap-2">
                        <button class="btn" onclick="resetPassword()">Jelszó módosítása</button>
                        <a href="index.html">Vissza a bejelentkezéshez</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="auth.js"></script>
</body>
</html>
