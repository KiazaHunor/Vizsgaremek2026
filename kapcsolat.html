<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Kapcsolat – Fizz Liga</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root {
      --bg-main: #0b0f14;
      --bg-card: #121821;
      --accent: #00ff9d;
      --accent2: #00b3ff;
      --text-main: #e6edf3;
      --text-muted: #9aa7b2;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #0f1722, #0b0f14 70%);
      color: var(--text-main);
    }

    /* ===== HERO ===== */
    .contact-hero {
      text-align: center;
      padding: 60px 20px 40px;
      border-bottom: 2px solid var(--accent);
      box-shadow: 0 0 25px rgba(0,255,157,0.15);
    }

    .accent-line {
      height: 3px;
      width: 60px;
      background: var(--accent);
      margin: 15px auto 0;
      border-radius: 10px;
      box-shadow: 0 0 12px var(--accent);
    }

    /* ===== CARD ===== */
    .contact-card {
      background: rgba(18, 24, 33, 0.85);
      border-radius: 18px;
      padding: 40px;
      backdrop-filter: blur(10px);
      border: 1px solid #1f2a36;
      box-shadow: 0 0 25px rgba(0,0,0,0.35);
      margin-top: 40px;
    }

    h3 {
      color: var(--accent);
    }

    p {
      color: var(--text-muted);
    }

    /* ===== FORM ===== */
    .form-control {
      background-color: #0f141c;
      border: 1px solid #1f2a36;
      color: var(--text-main);
      border-radius: 10px;
      padding: 10px 15px;
    }

    .form-control:focus {
      border-color: var(--accent);
      box-shadow: 0 0 10px rgba(0,255,157,0.25);
      background-color: #0f141c;
      color: var(--text-main);
    }

    label {
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    /* ===== BUTTONS ===== */
    .btn-send {
      margin-top: 10px;
      padding: 10px 30px;
      border-radius: 30px;
      background: var(--accent);
      border: none;
      color: #000;
      font-weight: 600;
      transition: all 0.25s ease;
    }

    .btn-send:hover {
      background: var(--accent2);
      box-shadow: 0 0 15px var(--accent2);
    }

    .btn-back {
      margin-top: 30px;
      padding: 10px 25px;
      border-radius: 30px;
      border: 1px solid var(--accent);
      color: var(--accent);
      transition: all 0.25s ease;
    }

    .btn-back:hover {
      background: var(--accent);
      color: #000;
      box-shadow: 0 0 15px var(--accent);
    }

    .email-highlight {
      color: var(--accent2);
      font-weight: 600;
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <section class="contact-hero">
    <h1>📬 Kapcsolat</h1>
    <div class="accent-line"></div>
  </section>

  <div class="container">
    <div class="contact-card">

      <p>Kérdésed, hibát találtál vagy ötleted van? Írj nekünk!</p>
      <p><strong>Email:</strong> <span class="email-highlight">fizzliga@gmail.com</span></p>

      <form class="mt-4">
        <div class="mb-3">
          <label>Név</label>
          <input type="text" class="form-control" placeholder="Neved">
        </div>

        <div class="mb-3">
          <label>Email cím</label>
          <input type="email" class="form-control" placeholder="email@pelda.hu">
        </div>

        <div class="mb-3">
          <label>Üzenet</label>
          <textarea class="form-control" rows="4" placeholder="Írd ide az üzeneted..."></textarea>
        </div>

        <button type="submit" class="btn btn-send">Üzenet küldése</button>
      </form>

      <a href="szep.html" class="btn btn-back">⬅ Vissza a főoldalra</a>

    </div>
  </div>

</body>
</html>
