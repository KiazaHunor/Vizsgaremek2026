<!DOCTYPE html>
<html lang="hu">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fizz Liga Draft</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0b0f14;
      --field-dark: #0e3b2e;
      --field-light: #145c45;
      --card: #121821;
      --accent: #00ff9d;
      --accent2: #00b3ff;
      --text-main: #e6edf3;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      color: var(--text-main);
      background: radial-gradient(circle at top, #0f1722, #0b0f14 70%);
    }

    h1 {
      margin-top: 40px;
      color: var(--accent);
      font-weight: 700;
    }

    /* ===== LOADER (neon glitch) ===== */
    .loader {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: monospace;
      font-size: 28px;
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent2);
      animation: pulse 1s infinite alternate;
      z-index: 9999;
    }

    @keyframes pulse {
      from {
        opacity: 0.5;
      }

      to {
        opacity: 1;
      }
    }

    /* ===== FORMATION FIELD ===== */
    .formation-container {
      margin-top: 40px;
      padding: 30px;
      border-radius: 20px;
      background:
        repeating-linear-gradient(to bottom,
          var(--field-dark),
          var(--field-dark) 60px,
          var(--field-light) 60px,
          var(--field-light) 120px);
      box-shadow: 0 0 35px rgba(0, 255, 157, 0.15);
      border: 2px solid rgba(0, 255, 157, 0.2);
    }

    .formation-row {
      display: flex;
      justify-content: center;
      gap: 25px;
      margin: 20px 0;
      flex-wrap: wrap;
    }

    /* ===== PLAYER SLOTS ===== */
    .player {
      width: 95px;
      height: 75px;
      background: linear-gradient(145deg, #1a2430, #10161f);
      border: 1px solid #1f2a36;
      border-radius: 14px;
      color: var(--accent);
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transform: translateY(-25px);
      transition: all 0.35s ease;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.4);
    }

    .player.show {
      opacity: 1;
      transform: translateY(0);
    }

    .player:hover {
      transform: scale(1.08);
      border-color: var(--accent);
      box-shadow: 0 0 15px var(--accent);
    }

    /* ===== FORMATION BUTTONS ===== */
    .btn-formation {
      margin: 10px;
      padding: 10px 25px;
      font-weight: 600;
      border-radius: 30px;
      border: 1px solid var(--accent);
      color: var(--accent);
      background: transparent;
      transition: all 0.25s ease;
    }

    .btn-formation:hover {
      background: var(--accent);
      color: #000;
      box-shadow: 0 0 15px var(--accent);
      transform: scale(1.05);
    }

    /* ===== BACK BUTTON ===== */
    .btn-back {
      margin-top: 30px;
      border-radius: 30px;
      border: 1px solid var(--accent2);
      color: var(--accent2);
      padding: 8px 22px;
    }

    .btn-back:hover {
      background: var(--accent2);
      color: #000;
      box-shadow: 0 0 12px var(--accent2);
    }
  </style>

</head>

<body>
  <div id="main-content">
    <div class="container">
      <h1 id="cim">Válassz formációt</h1>
      <div id="formaciok">
        <button class="btn btn-outline-success btn-formation" onclick="loadFormation('4-3-3')">4-3-3</button>
        <button class="btn btn-outline-success btn-formation" onclick="loadFormation('4-4-2')">4-4-2</button>
        <button class="btn btn-outline-success btn-formation" onclick="loadFormation('4-1-2-1-2')">4-1-2-1-2</button>
      </div>

      <div id="formation-container" class="formation-container"></div>
    </div>
  </div>
  <a href="szep.html" class="btn btn-outline-light mt-4">⬅ Vissza a főoldalra</a>

  <script>
    function loadFormation(formation) {
      document.getElementById("cim").innerText = "Állítsd össze a csapatodat";
      document.getElementById("formaciok").style.display = "none";

      const container = document.getElementById('formation-container');

      let html = "";

      if (formation === '4-3-3') {
        html = `
          <div class="formation-row">
            <div class="player" onclick="loadPlayers('LW')">LW</div>
            <div class="player" onclick="loadPlayers('CF')">CF</div>
            <div class="player" onclick="loadPlayers('RW')">RW</div>
          </div>
          <div class="formation-row">
            <div class="player" onclick="loadPlayers('CM')">CM</div>
            <div class="player" onclick="loadPlayers('CAM')">CAM</div>
            <div class="player" onclick="loadPlayers('CM')">CM</div>
          </div>
          <div class="formation-row">
            <div class="player" onclick="loadPlayers('LB')">LB</div>
            <div class="player" onclick="loadPlayers('CB')">CB</div>
            <div class="player" onclick="loadPlayers('CB')">CB</div>
            <div class="player" onclick="loadPlayers('RB')">RB</div>
          </div>
          <div class="formation-row">
            <div class="player" onclick="loadPlayers('GK')">GK</div>
          </div>
        `;
      } else if (formation === '4-4-2') {
        html = `
          <div class="formation-row">
            <div class="player" onclick="loadPlayers('CF')">CF</div>
            <div class="player" onclick="loadPlayers('CF')">CF</div>
          </div>
          <div class="formation-row">
            <div class="player" onclick="loadPlayers('LM')">LM</div>
            <div class="player" onclick="loadPlayers('CM')">CM</div>
            <div class="player" onclick="loadPlayers('CM')">CM</div>
            <div class="player" onclick="loadPlayers('RM')">RM</div>
          </div>
          <div class="formation-row">
            <div class="player" onclick="loadPlayers('LB')">LB</div>
            <div class="player" onclick="loadPlayers('CB')">CB</div>
            <div class="player" onclick="loadPlayers('CB')">CB</div>
            <div class="player" onclick="loadPlayers('RB')">RB</div>
          </div>
          <div class="formation-row">
            <div class="player" onclick="loadPlayers('GK')">GK</div>
          </div>
        `;
      } else if (formation === '4-1-2-1-2') {
        html = `
          <div class="formation-row">
            <div class="player" onclick="loadPlayers('CF')">CF</div>
            <div class="player" onclick="loadPlayers('CF')">CF</div>
          </div>
          <div class="formation-row">
            <div class="player" onclick="loadPlayers('CAM')">CAM</div>
          </div>
          <div class="formation-row">
            <div class="player" onclick="loadPlayers('CM')">CM</div>
            <div class="player" onclick="loadPlayers('CM')">CM</div>
          </div>
          <div class="formation-row">
            <div class="player" onclick="loadPlayers('CDM')">CDM</div>
          </div>
          <div class="formation-row">
            <div class="player" onclick="loadPlayers('LB')">LB</div>
            <div class="player" onclick="loadPlayers('CB')">CB</div>
            <div class="player" onclick="loadPlayers('CB')">CB</div>
            <div class="player" onclick="loadPlayers('RB')">RB</div>
          </div>
          <div class="formation-row">
            <div class="player" onclick="loadPlayers('GK')">GK</div>
          </div>
        `;
      }

      container.innerHTML = html;

      // Animáció minden gombra egymás után
      const players = container.querySelectorAll('.player');
      players.forEach((player, i) => {
        setTimeout(() => {
          player.classList.add('show');
        }, i * 250);
      });
    }
  </script>
</body>

</html>
