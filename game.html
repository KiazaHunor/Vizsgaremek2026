<!DOCTYPE html>
<html lang="hu">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fizz Liga Draft</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
  :root {
    --bg-main: #0b0f14;
    --field-dark: #0e3b2e;
    --field-light: #145c45;
    --card: #121821;
    --accent: #00ff9d;
    --accent2: #00b3ff;
    --text-main: #e6edf3;
  }

  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    color: var(--text-main);
    background: radial-gradient(circle at top, #0f1722, #0b0f14 70%);
  }

  h1 {
    margin-top: 40px;
    color: var(--accent);
    font-weight: 700;
  }

  .formation-container {
    margin-top: 40px;
    padding: 30px;
    border-radius: 20px;
    background:
      repeating-linear-gradient(
        to bottom,
        var(--field-dark),
        var(--field-dark) 60px,
        var(--field-light) 60px,
        var(--field-light) 120px
      );
    box-shadow: 0 0 35px rgba(0, 255, 157, 0.15);
    border: 2px solid rgba(0, 255, 157, 0.2);
  }

  .formation-row {
    margin: 20px 0;
  }

  .player {
    min-height: 100px;
    padding: 8px;
    background: linear-gradient(145deg, #1a2430, #10161f);
    border: 1px solid #1f2a36;
    border-radius: 14px;
    color: var(--accent);
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.4);
    text-align: center;
    font-size: 12px;
    line-height: 1.2;
    transition: 0.25s;
  }

  .player:hover {
    transform: scale(1.05);
    border-color: var(--accent);
    box-shadow: 0 0 15px var(--accent);
  }

  .btn-formation {
    margin: 10px;
    padding: 10px 25px;
    font-weight: 600;
    border-radius: 30px;
    border: 1px solid var(--accent);
    color: var(--accent);
    background: transparent;
    transition: all 0.25s ease;
  }

  .btn-formation:hover {
    background: var(--accent);
    color: #000;
    box-shadow: 0 0 15px var(--accent);
    transform: scale(1.05);
  }

  .list-group-item {
    cursor: pointer;
  }
</style>
</head>

<body>
  <div id="main-content">
    <div class="container">
      <h1 id="cim">Válassz formációt</h1>

      <div id="formaciok">
        <button class="btn btn-outline-success btn-formation" onclick="loadFormation('4-3-3')">4-3-3</button>
        <button class="btn btn-outline-success btn-formation" onclick="loadFormation('4-4-2')">4-4-2</button>
        <button class="btn btn-outline-success btn-formation" onclick="loadFormation('4-1-2-1-2')">4-1-2-1-2</button>
         <button class="btn btn-outline-success btn-formation" onclick="loadFormation('4-5-1')">4-5-1</button>
        <button class="btn btn-outline-success btn-formation" onclick="loadFormation('3-4-3')">3-4-3</button>
        <button class="btn btn-outline-success btn-formation" onclick="loadFormation('3-5-2')">3-5-2</button>
        <button class="btn btn-outline-success btn-formation" onclick="loadFormation('5-2-2-2')">5-2-2-2</button>
        <button class="btn btn-outline-success btn-formation" onclick="loadFormation('5-3-2-1')">5-3-2-1</button>
        <button class="btn btn-outline-success btn-formation" onclick="loadFormation('5-4-1')">5-4-1</button>
      </div>

      <div id="formation-container" class="formation-container"></div>
    </div>
  </div>

  <a href="foprogram/szep.html" class="btn btn-outline-light mt-4">⬅ Vissza a főoldalra</a>

  <div class="modal fade" id="playerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content bg-dark text-light">
        <div class="modal-header">
          <h5 class="modal-title">Válassz játékost</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="player-list" class="list-group"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    let selectedSlot = null;

    function loadFormation(formation) {
      document.getElementById("cim").innerText = "Állítsd össze a csapatodat";
      document.getElementById("formaciok").style.display = "none";

      const container = document.getElementById("formation-container");
      let html = "";

     if (formation === "4-3-3") {
  html = `
    <div class="row justify-content-center g-3 mb-4">
      <div class="col-4">
        <div class="player" onclick="loadPlayers('LW', this)">LW</div>
      </div>
      <div class="col-4">
        <div class="player" onclick="loadPlayers('CF', this)">CF</div>
      </div>
      <div class="col-4">
        <div class="player" onclick="loadPlayers('RW', this)">RW</div>
      </div>
    </div>

    <div class="row justify-content-center g-3 mb-4">
      <div class="col-4">
        <div class="player" onclick="loadPlayers('CM', this)">CM</div>
      </div>
      <div class="col-4">
        <div class="player" onclick="loadPlayers('CAM', this)">CAM</div>
      </div>
      <div class="col-4">
        <div class="player" onclick="loadPlayers('CM', this)">CM</div>
      </div>
    </div>

    <div class="row justify-content-center g-3 mb-4">
      <div class="col-3">
        <div class="player" onclick="loadPlayers('LB', this)">LB</div>
      </div>
      <div class="col-3">
        <div class="player" onclick="loadPlayers('CB', this)">CB</div>
      </div>
      <div class="col-3">
        <div class="player" onclick="loadPlayers('CB', this)">CB</div>
      </div>
      <div class="col-3">
        <div class="player" onclick="loadPlayers('RB', this)">RB</div>
      </div>
    </div>

    <div class="row justify-content-center">
      <div class="col-4">
        <div class="player" onclick="loadPlayers('GK', this)">GK</div>
      </div>
    </div>
  `;

      } else if (formation === "4-4-2") {
        html = `
          <div class="formation-row">
            <div class="player" onclick="loadPlayers('CF', this)">CF</div>
            <div class="player" onclick="loadPlayers('CF', this)">CF</div>
          </div>
          <div class="formation-row">
            <div class="player" onclick="loadPlayers('LM', this)">LM</div>
            <div class="player" onclick="loadPlayers('CM', this)">CM</div>
            <div class="player" onclick="loadPlayers('CM', this)">CM</div>
            <div class="player" onclick="loadPlayers('RM', this)">RM</div>
          </div>
          <div class="formation-row">
            <div class="player" onclick="loadPlayers('LB', this)">LB</div>
            <div class="player" onclick="loadPlayers('CB', this)">CB</div>
            <div class="player" onclick="loadPlayers('CB', this)">CB</div>
            <div class="player" onclick="loadPlayers('RB', this)">RB</div>
          </div>
          <div class="formation-row">
            <div class="player" onclick="loadPlayers('GK', this)">GK</div>
          </div>
        `;
      } else if (formation === "4-1-2-1-2") {
        html = `
          <div class="formation-row">
            <div class="player" onclick="loadPlayers('CF', this)">CF</div>
            <div class="player" onclick="loadPlayers('CF', this)">CF</div>
          </div>
          <div class="formation-row">
            <div class="player" onclick="loadPlayers('CAM', this)">CAM</div>
          </div>
          <div class="formation-row">
            <div class="player" onclick="loadPlayers('CM', this)">CM</div>
            <div class="player" onclick="loadPlayers('CM', this)">CM</div>
          </div>
          <div class="formation-row">
            <div class="player" onclick="loadPlayers('CDM', this)">CDM</div>
          </div>
          <div class="formation-row">
            <div class="player" onclick="loadPlayers('LB', this)">LB</div>
            <div class="player" onclick="loadPlayers('CB', this)">CB</div>
            <div class="player" onclick="loadPlayers('CB', this)">CB</div>
            <div class="player" onclick="loadPlayers('RB', this)">RB</div>
          </div>
          <div class="formation-row">
            <div class="player" onclick="loadPlayers('GK', this)">GK</div>
          </div>
        `;
      }
      else if (formation === "4-5-1") {
  html = `
    <div class="formation-row">
      <div class="player" onclick="loadPlayers('CF', this)">CF</div>
    </div>

    <div class="formation-row">
      <div class="player" onclick="loadPlayers('LM', this)">LM</div>
      <div class="player" onclick="loadPlayers('CM', this)">CM</div>
      <div class="player" onclick="loadPlayers('CM', this)">CM</div>
      <div class="player" onclick="loadPlayers('RM', this)">RM</div>
    </div>

    <div class="formation-row">
      <div class="player" onclick="loadPlayers('CDM', this)">CDM</div>
    </div>

    <div class="formation-row">
      <div class="player" onclick="loadPlayers('LB', this)">LB</div>
      <div class="player" onclick="loadPlayers('CB', this)">CB</div>
      <div class="player" onclick="loadPlayers('CB', this)">CB</div>
      <div class="player" onclick="loadPlayers('RB', this)">RB</div>
    </div>

    <div class="formation-row">
      <div class="player" onclick="loadPlayers('GK', this)">GK</div>
    </div>
  `;
}
else if (formation === "3-4-3") {
  html = `
    <div class="formation-row">
      <div class="player" onclick="loadPlayers('LW', this)">LW</div>
      <div class="player" onclick="loadPlayers('CF', this)">CF</div>
      <div class="player" onclick="loadPlayers('RW', this)">RW</div>
    </div>

    <div class="formation-row">
      <div class="player" onclick="loadPlayers('LM', this)">LM</div>
      <div class="player" onclick="loadPlayers('CM', this)">CM</div>
      <div class="player" onclick="loadPlayers('CM', this)">CM</div>
      <div class="player" onclick="loadPlayers('RM', this)">RM</div>
    </div>

    <div class="formation-row">
      <div class="player" onclick="loadPlayers('CB', this)">CB</div>
      <div class="player" onclick="loadPlayers('CB', this)">CB</div>
      <div class="player" onclick="loadPlayers('CB', this)">CB</div>
    </div>

    <div class="formation-row">
      <div class="player" onclick="loadPlayers('GK', this)">GK</div>
    </div>
  `;
}
else if (formation === "3-5-2") {
  html = `
    <div class="formation-row">
      <div class="player" onclick="loadPlayers('CF', this)">CF</div>
      <div class="player" onclick="loadPlayers('CF', this)">CF</div>
    </div>

    <div class="formation-row">
      <div class="player" onclick="loadPlayers('LM', this)">LM</div>
      <div class="player" onclick="loadPlayers('CM', this)">CM</div>
      <div class="player" onclick="loadPlayers('CAM', this)">CAM</div>
      <div class="player" onclick="loadPlayers('CM', this)">CM</div>
      <div class="player" onclick="loadPlayers('RM', this)">RM</div>
    </div>

    <div class="formation-row">
      <div class="player" onclick="loadPlayers('CB', this)">CB</div>
      <div class="player" onclick="loadPlayers('CB', this)">CB</div>
      <div class="player" onclick="loadPlayers('CB', this)">CB</div>
    </div>

    <div class="formation-row">
      <div class="player" onclick="loadPlayers('GK', this)">GK</div>
    </div>
  `;
}
else if (formation === "5-2-2-2") {
  html = `
    <div class="formation-row">
      <div class="player" onclick="loadPlayers('CF', this)">CF</div>
      <div class="player" onclick="loadPlayers('CF', this)">CF</div>
    </div>

    <div class="formation-row">
      <div class="player" onclick="loadPlayers('CAM', this)">CAM</div>
      <div class="player" onclick="loadPlayers('CAM', this)">CAM</div>
    </div>

    <div class="formation-row">
      <div class="player" onclick="loadPlayers('CDM', this)">CDM</div>
      <div class="player" onclick="loadPlayers('CDM', this)">CDM</div>
    </div>

    <div class="formation-row">
      <div class="player" onclick="loadPlayers('LWB', this)">LWB</div>
      <div class="player" onclick="loadPlayers('CB', this)">CB</div>
      <div class="player" onclick="loadPlayers('CB', this)">CB</div>
      <div class="player" onclick="loadPlayers('CB', this)">CB</div>
      <div class="player" onclick="loadPlayers('RWB', this)">RWB</div>
    </div>

    <div class="formation-row">
      <div class="player" onclick="loadPlayers('GK', this)">GK</div>
    </div>
  `;
}
else if (formation === "5-3-2-1") {
  html = `
    <div class="formation-row">
      <div class="player" onclick="loadPlayers('CF', this)">CF</div>
    </div>

    <div class="formation-row">
      <div class="player" onclick="loadPlayers('CAM', this)">CAM</div>
      <div class="player" onclick="loadPlayers('CAM', this)">CAM</div>
    </div>

    <div class="formation-row">
      <div class="player" onclick="loadPlayers('CM', this)">CM</div>
      <div class="player" onclick="loadPlayers('CM', this)">CM</div>
      <div class="player" onclick="loadPlayers('CM', this)">CM</div>
    </div>

    <div class="formation-row">
      <div class="player" onclick="loadPlayers('LWB', this)">LWB</div>
      <div class="player" onclick="loadPlayers('CB', this)">CB</div>
      <div class="player" onclick="loadPlayers('CB', this)">CB</div>
      <div class="player" onclick="loadPlayers('CB', this)">CB</div>
      <div class="player" onclick="loadPlayers('RWB', this)">RWB</div>
    </div>

    <div class="formation-row">
      <div class="player" onclick="loadPlayers('GK', this)">GK</div>
    </div>
  `;
}
else if (formation === "5-4-1") {
  html = `
    <div class="formation-row">
      <div class="player" onclick="loadPlayers('CF', this)">CF</div>
    </div>

    <div class="formation-row">
      <div class="player" onclick="loadPlayers('LM', this)">LM</div>
      <div class="player" onclick="loadPlayers('CM', this)">CM</div>
      <div class="player" onclick="loadPlayers('CM', this)">CM</div>
      <div class="player" onclick="loadPlayers('RM', this)">RM</div>
    </div>

    <div class="formation-row">
      <div class="player" onclick="loadPlayers('LWB', this)">LWB</div>
      <div class="player" onclick="loadPlayers('CB', this)">CB</div>
      <div class="player" onclick="loadPlayers('CB', this)">CB</div>
      <div class="player" onclick="loadPlayers('CB', this)">CB</div>
      <div class="player" onclick="loadPlayers('RWB', this)">RWB</div>
    </div>

    <div class="formation-row">
      <div class="player" onclick="loadPlayers('GK', this)">GK</div>
    </div>
  `;
}
      container.innerHTML = html;

      const players = container.querySelectorAll(".player");
      players.forEach((player, i) => {
        setTimeout(() => {
          player.classList.add("show");
        }, i * 180);
      });
    }

    async function loadPlayers(position, element) {
      selectedSlot = element;

      try {
        const response = await fetch(`get_players.php?position=${encodeURIComponent(position)}`);
        const text = await response.text();
        const data = JSON.parse(text);

        const playerList = document.getElementById("player-list");
        playerList.innerHTML = "";

        if (!data.success) {
          playerList.innerHTML = `<div class="text-danger">${data.message}</div>`;
        } else if (!data.players || data.players.length === 0) {
          playerList.innerHTML = `<div class="text-warning">Nincs játékos erre a pozícióra.</div>`;
        } else {
          data.players.forEach(player => {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "list-group-item list-group-item-action";
            button.innerHTML = `
                  <strong>${player.name}</strong><br>
                  <small>${player.team}</small><br>
                  <small>${player.nationality}</small>
                `;

            button.onclick = function () {
             selectedSlot.innerHTML = `
            <div style="font-size:14px; line-height:1.2;">
              <strong>${player.name}</strong><br>
              ${player.nationality}<br>
              ${player.team}
            </div>
            `;
              selectedSlot.dataset.playerId = player.id;
              const modalInstance = bootstrap.Modal.getInstance(document.getElementById("playerModal"));
              modalInstance.hide();
            };

            playerList.appendChild(button);
          });
        }

        const modal = new bootstrap.Modal(document.getElementById("playerModal"));
        modal.show();

      } catch (error) {
        console.error("Hiba:", error);
        alert("Hiba történt a játékosok betöltése közben.");
      }
    }
  </script>
</body>

</html>
