<!DOCTYPE html>
<html lang="hu">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fizz Liga Draft</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>

.formation-container {
  margin-top: 40px;
  padding: 30px;
  border-radius: 20px;
  background:
    repeating-linear-gradient(
      to bottom,
      var(--field-dark),
      var(--field-dark) 60px,
      var(--field-light) 60px,
      var(--field-light) 120px
    );
  box-shadow: 0 0 35px rgba(0, 255, 157, 0.15);
  border: 2px solid rgba(0, 255, 157, 0.2);
}

    .player.locked {
        cursor: default;
        border-color: #666;
        box-shadow: none;
        color: #ccc;
        background: #1a1f26;
      }

      .player.locked:hover {
        transform: none;
        box-shadow: none;
      }
    :root {
      --bg-main: #0b0f14;
      --field-dark: #0e3b2e;
      --field-light: #145c45;
      --card: #121821;
      --accent: #00ff9d;
      --accent2: #00b3ff;
      --text-main: #e6edf3;
    }


.formation-row {
  margin-bottom: 18px;
}

.player {
  width: 100%;
  min-height: 90px;
  padding: 8px;
  background: linear-gradient(145deg, #1a2430, #10161f);
  border: 1px solid #1f2a36;
  border-radius: 14px;
  color: var(--accent);
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  text-align: center;
  font-size: 12px;
  line-height: 1.2;
  box-shadow: 0 0 10px rgba(0, 0, 0, 0.4);
  transition: 0.25s;
}

.player:hover {
  transform: scale(1.05);
  border-color: var(--accent);
  box-shadow: 0 0 15px var(--accent);
}

@media (max-width: 768px) {
  .formation-container {
    padding: 15px;
  }

  .player {
    min-height: 70px;
    font-size: 10px;
    padding: 6px;
  }
}
</style>
</head>

<body>
  <div id="main-content">
    <div class="container">
      <h1 id="cim">Válassz formációt</h1>

      <div id="formaciok">
        <button class="btn btn-outline-success btn-formation" onclick="loadFormation('4-3-3')">4-3-3</button>
        <button class="btn btn-outline-success btn-formation" onclick="loadFormation('4-4-2')">4-4-2</button>
        <button class="btn btn-outline-success btn-formation" onclick="loadFormation('4-1-2-1-2')">4-1-2-1-2</button>
         <button class="btn btn-outline-success btn-formation" onclick="loadFormation('4-5-1')">4-5-1</button>
        <button class="btn btn-outline-success btn-formation" onclick="loadFormation('3-4-3')">3-4-3</button>
        <button class="btn btn-outline-success btn-formation" onclick="loadFormation('3-5-2')">3-5-2</button>
        <button class="btn btn-outline-success btn-formation" onclick="loadFormation('5-2-2-2')">5-2-2-2</button>
        <button class="btn btn-outline-success btn-formation" onclick="loadFormation('5-3-2-1')">5-3-2-1</button>
        <button class="btn btn-outline-success btn-formation" onclick="loadFormation('5-4-1')">5-4-1</button>
      </div>

      <div id="formation-container" class="formation-container"></div>
    </div>
  </div>

  <a href="szep.html" class="btn btn-outline-light mt-4">⬅ Vissza a főoldalra</a>

  <div class="modal fade" id="playerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content bg-dark text-light">
        <div class="modal-header">
          <h5 class="modal-title">Válassz játékost</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="player-list" class="list-group"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
  let selectedSlot = null;

  const formations = {
    "4-3-3": [
      ["LW", "CF", "RW"],
      ["CM", "CAM", "CM"],
      ["LB", "CB", "CB", "RB"],
      ["GK"]
    ],
    "4-4-2": [
      ["CF", "CF"],
      ["LM", "CM", "CM", "RM"],
      ["LB", "CB", "CB", "RB"],
      ["GK"]
    ],
    "4-1-2-1-2": [
      ["CF", "CF"],
      ["CAM"],
      ["CM", "CM"],
      ["CDM"],
      ["LB", "CB", "CB", "RB"],
      ["GK"]
    ],
    "4-5-1": [
      ["CF"],
      ["LM", "CM", "CDM", "CM", "RM"],
      ["LB", "CB", "CB", "RB"],
      ["GK"]
    ],
    "3-4-3": [
      ["LW", "CF", "RW"],
      ["LM", "CM", "CM", "RM"],
      ["CB", "CB", "CB"],
      ["GK"]
    ],
    "3-5-2": [
      ["CF", "CF"],
      ["LM", "CM", "CAM", "CM", "RM"],
      ["CB", "CB", "CB"],
      ["GK"]
    ],
    "5-2-2-2": [
      ["CF", "CF"],
      ["CAM", "CAM"],
      ["CDM", "CDM"],
      ["LWB", "CB", "CB", "CB", "RWB"],
      ["GK"]
    ],
    "5-3-2-1": [
      ["CF"],
      ["CAM", "CAM"],
      ["CM", "CM", "CM"],
      ["LWB", "CB", "CB", "CB", "RWB"],
      ["GK"]
    ],
    "5-4-1": [
      ["CF"],
      ["LM", "CM", "CM", "RM"],
      ["LWB", "CB", "CB", "CB", "RWB"],
      ["GK"]
    ]
  };

  function getColClass(count) {
    switch (count) {
      case 1: return "col-4";
      case 2: return "col-4";
      case 3: return "col-4";
      case 4: return "col-3";
      case 5: return "col";
      default: return "col";
    }
  }

  function generateFormationHTML(rows) {
    return rows.map((row, rowIndex) => {
      const colClass = getColClass(row.length);
      const isLastRow = rowIndex === rows.length - 1;

      return `
        <div class="row justify-content-center g-3 ${isLastRow ? "" : "mb-4"}">
          ${row.map(position => `
            <div class="${colClass}">
              <div class="player" onclick="loadPlayers('${position}', this)">${position}</div>
            </div>
          `).join("")}
        </div>
      `;
    }).join("");
  }

  function loadFormation(formation) {
    document.getElementById("cim").innerText = "Állítsd össze a csapatodat";
    document.getElementById("formaciok").style.display = "none";

    const container = document.getElementById("formation-container");
    const rows = formations[formation];

    if (!rows) {
      container.innerHTML = `<div class="text-danger">Ismeretlen formáció.</div>`;
      return;
    }

    container.innerHTML = generateFormationHTML(rows);

    const players = container.querySelectorAll(".player");
    players.forEach((player, i) => {
      setTimeout(() => {
        player.classList.add("show");
      }, i * 180);
    });
  }

  async function loadPlayers(position, element) {
    selectedSlot = element;

    try {
      const response = await fetch(`get_players.php?position=${encodeURIComponent(position)}`);
      const text = await response.text();
      const data = JSON.parse(text);

      const playerList = document.getElementById("player-list");
      playerList.innerHTML = "";

      if (!data.success) {
        playerList.innerHTML = `<div class="text-danger">${data.message}</div>`;
      } else if (!data.players || data.players.length === 0) {
        playerList.innerHTML = `<div class="text-warning">Nincs játékos erre a pozícióra.</div>`;
      } else {
        data.players.forEach(player => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "list-group-item list-group-item-action";
          button.innerHTML = `
            <strong>${player.name}</strong><br>
            <small>${player.team}</small><br>
            <small>${player.nationality}</small><br>
            <small>${player.position}</small>
          `;

          button.onclick = function () {
            selectedSlot.innerHTML = `
              <div style="font-size:11px; line-height:1.2;">
                <strong>${player.name}</strong><br>
                ${player.nationality}<br>
                ${player.team}<br>
                ${player.position}
              </div>
            `;

            selectedSlot.dataset.playerId = player.id;
            selectedSlot.classList.add("locked");
            selectedSlot.onclick = null;

            const modalInstance = bootstrap.Modal.getInstance(document.getElementById("playerModal"));
            modalInstance.hide();
          };

          playerList.appendChild(button);
        });
      }

      const modal = new bootstrap.Modal(document.getElementById("playerModal"));
      modal.show();

    } catch (error) {
      console.error("Hiba:", error);
      alert("Hiba történt a játékosok betöltése közben.");
    }
  }
</script>
</body>

</html>
